name: Sync aliases from Google Sheet

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip if the push was from this workflow (avoid infinite loop)
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Sync aliases
        run: node files/sync-aliases.js files/data.json

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add files/data.json
          git diff --staged --quiet || git commit -m "Sync aliases from Google Sheet"
          git push
